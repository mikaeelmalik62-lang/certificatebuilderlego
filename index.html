<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGO Speed Build Certificate Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:#1a1a2e; min-height:100vh; }

/* ══ TOP BAR ══ */
#control-panel {
  background:#16213e; border-bottom:3px solid #0f3460;
  padding:8px 16px; display:flex; flex-wrap:wrap;
  align-items:center; gap:8px;
  position:sticky; top:0; z-index:200;
}
#control-panel h1 { font-family:'Fredoka One',cursive; color:#f7b731; font-size:17px; flex:0 0 auto; }
.ctrl-group {
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:9px; padding:5px 10px;
}
.ctrl-group label { color:#aaa; font-size:11px; font-weight:700; text-transform:uppercase; white-space:nowrap; }
.ctrl-group input[type=text] {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:6px; color:#fff; font-family:'Nunito',sans-serif;
  font-size:13px; padding:4px 8px; outline:none; transition:border 0.2s;
}
.ctrl-group input[type=text]:focus { border-color:#f7b731; }
.ctrl-group input.w-name   { width:155px; }
.ctrl-group input.w-narrow { width:72px; }
.ctrl-group input.w-mid    { width:120px; }
.ctrl-group input.w-wide   { width:195px; }
.print-btn {
  margin-left:auto; background:#f7b731; color:#1a1a2e; border:none;
  border-radius:9px; font-family:'Fredoka One',cursive; font-size:13px;
  padding:7px 18px; cursor:pointer; transition:all 0.2s;
  box-shadow:0 3px 0 #c77d0e; flex:0 0 auto; white-space:nowrap;
}
.print-btn:hover  { filter:brightness(1.1); transform:translateY(-1px); }
.print-btn:active { transform:translateY(1px); box-shadow:none; }

/* ══ SELECTOR BAR ══ */
#selector-bar {
  background:#0f1b35; border-bottom:2px solid #0a1528;
  padding:8px 18px; display:flex; flex-wrap:wrap; gap:14px;
  align-items:flex-start; position:sticky; top:52px; z-index:150;
}
.sel-group { display:flex; flex-direction:column; gap:4px; }
.sel-label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:1px; font-weight:700; }
.pills { display:flex; gap:4px; flex-wrap:wrap; }

.theme-pill {
  padding:4px 11px; border-radius:16px; border:2px solid transparent;
  font-family:'Fredoka One',cursive; font-size:11px; cursor:pointer;
  transition:all 0.18s; color:#fff; white-space:nowrap;
}
.theme-pill:hover  { filter:brightness(1.2); }
.theme-pill.active { border-color:#fff; transform:scale(1.07); box-shadow:0 0 8px rgba(255,255,255,0.25); }

.layout-pill {
  padding:3px 9px; border-radius:10px; border:1.5px solid rgba(255,255,255,0.12);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:10px;
  cursor:pointer; transition:all 0.15s; color:rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.04); white-space:nowrap;
}
.layout-pill:hover  { background:rgba(255,255,255,0.1); color:#fff; }
.layout-pill.active { border-color:#f7b731; color:#f7b731; background:rgba(247,183,49,0.12); }

/* ══ CERT AREA ══ */
#cert-area { display:flex; justify-content:center; padding:24px; }

.page {
  width:960px; height:680px; position:relative;
  border-radius:10px; overflow:hidden;
  box-shadow:0 12px 60px rgba(0,0,0,0.7); flex-shrink:0;
}

/* ══ BRICK CANVAS ══ */
#brick-canvas {
  position:absolute; top:0; left:0; width:100%; height:100%;
  z-index:2; pointer-events:none;
}

/* ══ PLACEMENT BADGE ══ */
.placement-badge {
  position:absolute; z-index:10;
  width:92px; height:92px; border-radius:50%;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
  transition:opacity 0.15s;
}
.placement-badge.gold {
  background:radial-gradient(circle at 36% 30%, #fff9c0, #f7b731 44%, #b86b00 100%);
  border:4px solid #c77d0e;
  box-shadow:0 0 0 3px #f7b731, 0 0 22px rgba(247,183,49,0.7), 0 5px 14px rgba(0,0,0,0.4);
}
.placement-badge.silver {
  background:radial-gradient(circle at 36% 30%, #fff, #d4d4d4 44%, #777 100%);
  border:4px solid #999;
  box-shadow:0 0 0 3px #ccc, 0 0 18px rgba(180,180,180,0.55), 0 5px 14px rgba(0,0,0,0.35);
}
.placement-badge.bronze {
  background:radial-gradient(circle at 36% 30%, #ffe0a0, #cd7f32 44%, #7a3a00 100%);
  border:4px solid #8b4513;
  box-shadow:0 0 0 3px #cd7f32, 0 0 18px rgba(205,127,50,0.55), 0 5px 14px rgba(0,0,0,0.35);
}
.placement-badge.other {
  background:radial-gradient(circle at 36% 30%, #d0eaff, #2255cc 44%, #0a1a6e 100%);
  border:4px solid #1a3a9a;
  box-shadow:0 0 0 3px #2255cc, 0 0 18px rgba(34,85,204,0.5), 0 5px 14px rgba(0,0,0,0.35);
}
.placement-num {
  font-family:'Fredoka One',cursive; font-size:27px; line-height:1;
  color:#fff; text-shadow:0 2px 5px rgba(0,0,0,0.45);
}
.placement-label {
  font-family:'Fredoka One',cursive; font-size:10px; letter-spacing:2px;
  color:rgba(255,255,255,0.92); text-shadow:0 1px 3px rgba(0,0,0,0.4);
  margin-top:1px;
}
.placement-stars { font-size:9px; margin-top:2px; letter-spacing:1px; }

/* ══ CERT CONTENT ══ */
.cert-content {
  position:absolute; z-index:3;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:14px 28px 12px;
  top:46px; left:46px; right:46px; bottom:46px; /* default — overridden by JS */
}

/* ══ COMMON ELEMENTS ══ */
.org-pill {
  font-family:'Fredoka One',cursive; font-size:13px;
  letter-spacing:1.5px; text-transform:uppercase;
  border-radius:20px; padding:4px 18px; border:2px solid;
  white-space:nowrap; text-align:center; max-width:100%;
  overflow:hidden; text-overflow:ellipsis;
}
.header-row { display:flex; align-items:center; gap:13px; }
.lego-badge {
  font-family:'Fredoka One',cursive; font-size:34px; letter-spacing:3px;
  border-radius:8px; padding:3px 18px; border:4px solid; line-height:1.2; flex-shrink:0;
}
.cert-title-line { font-family:'Fredoka One',cursive; font-size:26px; letter-spacing:1px; text-align:center; }
.stars-line { font-size:19px; letter-spacing:4px; margin-top:2px; text-align:center; }

.presented-block {
  border-radius:13px; padding:10px 28px 8px;
  text-align:center; position:relative;
  width:100%; max-width:660px; border:3px solid;
}
.presented-block::before {
  content:''; position:absolute; top:-12px; left:50%; transform:translateX(-50%);
  width:22px; height:11px;
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  border:3px solid; border-bottom:none;
}
.presented-label { font-size:12px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:4px; }

/* ══ NAME BRICKS ══ */
.lego-text-name {
  display:flex; justify-content:center; align-items:center;
  gap:3px; margin:4px 0 2px; width:100%; overflow:hidden;
}
.lego-letter {
  display:inline-flex; flex-direction:column; align-items:center;
  justify-content:flex-end; border-radius:4px; border:2.5px solid;
  position:relative; font-family:'Fredoka One',cursive;
  padding-bottom:3px; flex-shrink:0;
}
.lego-letter .stud {
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  border:2.5px solid; border-bottom:none;
}
.brick-xl { width:46px; height:54px; font-size:22px; }
.brick-xl .stud { width:16px; height:9px; }
.brick-lg { width:38px; height:46px; font-size:18px; }
.brick-lg .stud { width:13px; height:8px; }
.brick-md { width:31px; height:38px; font-size:15px; }
.brick-md .stud { width:11px; height:7px; top:-7px; }
.brick-sm { width:25px; height:31px; font-size:11px; }
.brick-sm .stud { width:9px; height:6px; top:-6px; }
.brick-xs { width:20px; height:25px; font-size:9px; }
.brick-xs .stud { width:7px; height:4px; top:-5px; }

.description-text {
  font-size:13px; text-align:center; max-width:530px;
  line-height:1.6; margin:1px 0;
}

/* ══ STAT CHIPS (time + set) ══ */
.stats-row { display:flex; align-items:center; gap:12px; justify-content:center; margin:1px 0; }
.stat-chip {
  display:none; align-items:center; gap:7px;
  border-radius:20px; padding:5px 16px; border:2.5px solid;
  font-family:'Fredoka One',cursive; font-size:14px; white-space:nowrap;
}
.stat-icon { font-size:15px; }

/* ══ AGE BADGE ══ */
.age-badge {
  display:none; align-items:center; gap:5px;
  border-radius:16px; padding:3px 16px; border:2px solid;
  font-family:'Fredoka One',cursive; font-size:12px; letter-spacing:0.5px;
}

/* ══ MINI BRICKS ROW ══ */
.bricks-row { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin:1px 0; }
.mini-brick {
  display:inline-flex; align-items:center; justify-content:center;
  width:46px; height:23px; border-radius:3px;
  border:1.5px solid rgba(0,0,0,0.2); box-shadow:0 2px 0 rgba(0,0,0,0.2); gap:4px;
}
.mini-brick .s {
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,0.35); border:1px solid rgba(0,0,0,0.12);
}

/* ══ SIGNATURE + DATE ══ */
.sig-section {
  width:100%; display:flex; align-items:flex-end;
  justify-content:space-between; gap:16px;
}
.sig-block { display:flex; flex-direction:column; align-items:center; gap:2px; }
.sig-canvas-wrap { position:relative; width:180px; height:44px; cursor:crosshair; }
.sig-canvas-wrap canvas { border-bottom:2px solid #888; cursor:crosshair; display:block; }
.sig-clear-btn {
  position:absolute; top:2px; right:0;
  font-size:9px; background:rgba(0,0,0,0.1); border:none;
  border-radius:3px; padding:2px 4px; cursor:pointer; color:#999;
}
.sig-clear-btn:hover { background:rgba(180,0,0,0.15); color:#a00; }
.sig-label-input {
  border:none; border-bottom:1px dashed #bbb; background:transparent;
  font-family:'Nunito',sans-serif; font-size:10px; color:#888;
  text-align:center; width:180px; letter-spacing:1px;
  text-transform:uppercase; outline:none;
}
.sig-label-input:focus { border-bottom-color:#f7b731; }
.date-block { display:none; flex-direction:column; align-items:flex-end; gap:2px; }
.date-label-text {
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:#aaa;
}
.date-value {
  font-family:'Fredoka One',cursive; font-size:14px;
  white-space:nowrap;
}

/* ══ THEMES ══ */
/* --- Classic --- */
.t-classic { background:#fff; }
.t-classic .cert-content { background:linear-gradient(155deg,#fffde4 0%,#fff 45%,#e8f4ff 100%); border:2px dashed #ddd; }
.t-classic .org-pill      { color:#1a5276; border-color:#1a5276; background:#fff; }
.t-classic .lego-badge    { background:#e3001b; color:#fff; border-color:#a00013; box-shadow:0 4px 0 #700009; }
.t-classic .cert-title-line { color:#f7b731; -webkit-text-stroke:1.5px #c77d0e; }
.t-classic .stars-line    { color:#e3001b; }
.t-classic .presented-block { background:#fff8e1; border-color:#f7b731; }
.t-classic .presented-block::before { background:#f7b731; border-color:#c77d0e; }
.t-classic .presented-label { color:#666; }
.t-classic .description-text { color:#333; }
.t-classic .lego-letter   { color:#111; }
.t-classic .stat-chip     { border-color:#f7b731; background:#fff8e1; color:#7a4a00; }
.t-classic .age-badge     { border-color:#e3001b; background:#fff0f0; color:#a00013; }
.t-classic .date-value    { color:#555; }
.t-classic .date-label-text { color:#aaa; }
/* --- Speed --- */
.t-speed { background:#111; }
.t-speed .cert-content { background:linear-gradient(155deg,#1c1400 0%,#0e0e0e 50%,#001400 100%); border:2px solid #f7b731; }
.t-speed .org-pill      { color:#f7b731; border-color:#f7b731; background:rgba(247,183,49,0.08); }
.t-speed .lego-badge    { background:#f7b731; color:#111; border-color:#c77d0e; box-shadow:0 4px 0 #7a4800; }
.t-speed .cert-title-line { color:#f7b731; -webkit-text-stroke:1px #c77d0e; }
.t-speed .stars-line    { color:#e3001b; }
.t-speed .presented-block { background:rgba(247,183,49,0.06); border-color:#f7b731; }
.t-speed .presented-block::before { background:#f7b731; border-color:#c77d0e; }
.t-speed .presented-label { color:#f7b731; }
.t-speed .description-text { color:#ddd; }
.t-speed .lego-letter   { color:#111; }
.t-speed .stat-chip     { border-color:#f7b731; background:rgba(247,183,49,0.08); color:#f7b731; }
.t-speed .age-badge     { border-color:#e3001b; background:rgba(227,0,27,0.1); color:#ff5555; }
.t-speed .sig-label-input { color:#f7b731; }
.t-speed .date-value    { color:#f7b731; }
.t-speed .date-label-text { color:#888; }
/* --- Space --- */
.t-space { background:#050a1a; }
.t-space .cert-content { background:radial-gradient(ellipse at 30% 20%,#0a1a40 0%,#050a1a 70%); border:2px solid #1a3a7a; }
.t-space .org-pill      { color:#7ecfff; border-color:#7ecfff; background:rgba(126,207,255,0.08); }
.t-space .lego-badge    { background:#0a2463; color:#7ecfff; border-color:#1a4a9a; box-shadow:0 4px 0 #050f2e; }
.t-space .cert-title-line { color:#7ecfff; -webkit-text-stroke:1px #2255aa; }
.t-space .stars-line    { color:#ffe566; }
.t-space .presented-block { background:rgba(126,207,255,0.05); border-color:#1a4a9a; }
.t-space .presented-block::before { background:#0a2463; border-color:#7ecfff; }
.t-space .presented-label { color:#7ecfff; }
.t-space .description-text { color:#aaccee; }
.t-space .stat-chip     { border-color:#1a4a9a; background:rgba(126,207,255,0.07); color:#7ecfff; }
.t-space .age-badge     { border-color:#7ecfff; background:rgba(126,207,255,0.08); color:#7ecfff; }
.t-space .sig-label-input { color:#7ecfff; }
.t-space .date-value    { color:#7ecfff; }
.t-space .date-label-text { color:#5588bb; }
/* --- Nature --- */
.t-nature { background:#f0f7ee; }
.t-nature .cert-content { background:linear-gradient(140deg,#e8f5e0 0%,#f5fff2 50%,#e0f0e8 100%); border:2px solid #a8d5a2; }
.t-nature .org-pill      { color:#2d6a4f; border-color:#2d6a4f; background:#fff; }
.t-nature .lego-badge    { background:#2d6a4f; color:#fff; border-color:#1b4332; box-shadow:0 4px 0 #0d2b1e; }
.t-nature .cert-title-line { color:#52b788; -webkit-text-stroke:1px #2d6a4f; }
.t-nature .stars-line    { color:#f4a261; }
.t-nature .presented-block { background:#f0faf0; border-color:#74c69d; }
.t-nature .presented-block::before { background:#74c69d; border-color:#52b788; }
.t-nature .presented-label { color:#555; }
.t-nature .description-text { color:#3a5a40; }
.t-nature .stat-chip     { border-color:#74c69d; background:#e8f5e0; color:#2d6a4f; }
.t-nature .age-badge     { border-color:#2d6a4f; background:#e8f5e0; color:#2d6a4f; }
.t-nature .date-value    { color:#3a5a40; }
.t-nature .date-label-text { color:#888; }
/* --- Royal --- */
.t-royal { background:#1a0a2e; }
.t-royal .cert-content { background:linear-gradient(155deg,#1e0a38 0%,#120520 50%,#1a0a2e 100%); border:2px solid #7b2d8b; }
.t-royal .org-pill      { color:#d4a017; border-color:#d4a017; background:rgba(212,160,23,0.1); }
.t-royal .lego-badge    { background:#7b2d8b; color:#f5d060; border-color:#5a1e68; box-shadow:0 4px 0 #3a0f46; }
.t-royal .cert-title-line { color:#f5d060; -webkit-text-stroke:1px #c9960a; }
.t-royal .stars-line    { color:#f5d060; }
.t-royal .presented-block { background:rgba(212,160,23,0.07); border-color:#7b2d8b; }
.t-royal .presented-block::before { background:#7b2d8b; border-color:#d4a017; }
.t-royal .presented-label { color:#d4a017; }
.t-royal .description-text { color:#c8a8e0; }
.t-royal .stat-chip     { border-color:#7b2d8b; background:rgba(212,160,23,0.07); color:#d4a017; }
.t-royal .age-badge     { border-color:#d4a017; background:rgba(212,160,23,0.07); color:#d4a017; }
.t-royal .sig-label-input { color:#d4a017; }
.t-royal .date-value    { color:#d4a017; }
.t-royal .date-label-text { color:#7b5a9a; }
/* --- Sunshine --- */
.t-sunshine { background:#fff9f0; }
.t-sunshine .cert-content { background:linear-gradient(145deg,#fff3d4 0%,#fff9f0 40%,#ffe8cc 100%); border:2px dashed #f4a261; }
.t-sunshine .org-pill      { color:#e07b00; border-color:#e07b00; background:#fff; }
.t-sunshine .lego-badge    { background:#e07b00; color:#fff; border-color:#a85800; box-shadow:0 4px 0 #6b3800; }
.t-sunshine .cert-title-line { color:#e07b00; -webkit-text-stroke:1.5px #a85800; }
.t-sunshine .stars-line    { color:#e3001b; }
.t-sunshine .presented-block { background:#fff3d4; border-color:#f4a261; }
.t-sunshine .presented-block::before { background:#f4a261; border-color:#e07b00; }
.t-sunshine .presented-label { color:#7a4a00; }
.t-sunshine .description-text { color:#5a3500; }
.t-sunshine .stat-chip     { border-color:#f4a261; background:#fff3d4; color:#7a4a00; }
.t-sunshine .age-badge     { border-color:#e07b00; background:#fff3d4; color:#7a4a00; }
.t-sunshine .date-value    { color:#c08040; }
.t-sunshine .date-label-text { color:#c08040; }

/* ══ PRINT ══ */
@media print {
  @page { size:11in 8.5in landscape; margin:0; }
  body { background:#fff !important; }
  #control-panel, #selector-bar { display:none !important; }
  #cert-area { padding:0 !important; display:block !important; }
  .page {
    width:11in !important; height:8.5in !important;
    box-shadow:none !important; border-radius:0 !important;
    overflow:visible !important;
  }
  #brick-canvas { width:11in !important; height:8.5in !important; }
  .sig-clear-btn { display:none !important; }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
}
</style>
</head>
<body>

<!-- ══ CONTROL PANEL ══ -->
<div id="control-panel">
  <h1>⚡ Speed Build Cert</h1>

  <div class="ctrl-group">
    <label>👤 Name</label>
    <input type="text" id="name-input" class="w-name" value="YOUR NAME" maxlength="24" placeholder="Type name…">
  </div>
  <div class="ctrl-group">
    <label>🥇 Place</label>
    <input type="text" id="placement-input" class="w-narrow" maxlength="5" placeholder="1st">
  </div>
  <div class="ctrl-group">
    <label>⏱️ Time</label>
    <input type="text" id="time-input" class="w-narrow" maxlength="8" placeholder="2:34">
  </div>
  <div class="ctrl-group">
    <label>🧱 Build</label>
    <input type="text" id="set-input" class="w-mid" maxlength="22" placeholder="Fire Station">
  </div>
  <div class="ctrl-group">
    <label>👶 Ages</label>
    <input type="text" id="age-input" class="w-narrow" maxlength="10" placeholder="5–6">
  </div>
  <div class="ctrl-group">
    <label>📅 Date</label>
    <input type="text" id="date-input" class="w-mid" maxlength="18" placeholder="May 3, 2025">
  </div>
  <div class="ctrl-group">
    <label>📋 Title</label>
    <input type="text" id="title-input" class="w-wide" maxlength="40" placeholder="Speed Build Challenge">
  </div>
  <div class="ctrl-group">
    <label>🏢 Org</label>
    <input type="text" id="org-input" class="w-wide" maxlength="42" value="Islamic Center of Brushy Creek">
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ Print / PDF</button>
</div>

<!-- ══ SELECTOR BAR ══ -->
<div id="selector-bar">

  <div class="sel-group">
    <div class="sel-label">🎨 Theme</div>
    <div class="pills">

// ══════════════════════════════════════════════════════════════
// REALISTIC LEGO BRICK DRAWING
// ══════════════════════════════════════════════════════════════
function drawBrick(ctx, x, y, w, h, baseColor, darkColor) {
  ctx.fillStyle = baseColor;
  ctx.beginPath(); roundRect(ctx, x, y+h*0.18, w, h*0.78, 3); ctx.fill();

  ctx.fillStyle = lighten(baseColor, 20);
  ctx.beginPath(); roundRect(ctx, x+1, y+h*0.18, w-2, h*0.78-2, 3); ctx.fill();

  ctx.fillStyle = darkColor;
  ctx.beginPath(); roundRect(ctx, x, y+h*0.84, w, h*0.12+1, 2); ctx.fill();

  ctx.fillStyle = lighten(baseColor, 38);
  ctx.fillRect(x+3, y+h*0.19, w-6, 2);

  const studRows = 2, studCols = 4;
  const studR = Math.min(w, h) * 0.085;
  const studH = studR * 1.1;
  const gapX  = w / (studCols + 1);
  const gapY  = (h * 0.58) / (studRows + 0.5);

  for (let r = 0; r < studRows; r++) {
    for (let c = 0; c < studCols; c++) {
      const sx = x + gapX * (c + 1);
      const sy = y + h * 0.18 + gapY * (r + 0.8);
      ctx.fillStyle = darkColor;
      ctx.beginPath(); ctx.ellipse(sx, sy+studH*0.5+1, studR, studR*0.45, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = baseColor;
      ctx.fillRect(sx-studR, sy-studH*0.2, studR*2, studH*0.75);
      ctx.fillStyle = lighten(baseColor, 22);
      ctx.beginPath(); ctx.ellipse(sx, sy-studH*0.2, studR, studR*0.45, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = lighten(baseColor, 42);
      ctx.beginPath(); ctx.ellipse(sx-studR*0.2, sy-studH*0.2-1, studR*0.38, studR*0.18, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = darkColor; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.ellipse(sx, sy-studH*0.2, studR, studR*0.45, 0, 0, Math.PI*2); ctx.stroke();
    }
  }
}

function lighten(hex, amt) {
  const c = parseInt(hex.slice(1), 16);
  return `rgb(${Math.min(255,(c>>16)+amt)},${Math.min(255,((c>>8)&0xff)+amt)},${Math.min(255,(c&0xff)+amt)})`;
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

// ══════════════════════════════════════════════════════════════
// LAYOUT BRICK PATTERNS
// ══════════════════════════════════════════════════════════════
const CW = 960, CH = 680;
const BW = 60,  BH = 34;

function layoutBricks(layout) {
  const bricks = []; let ci = 0;

  function row(y, x0, x1, bw=BW, bh=BH) {
    for (let x = x0; x < x1; x += bw) bricks.push({x, y, w:bw, h:bh, ci:ci++});
  }
  function col(x, y0, y1, bw=BH, bh=BW) {
    for (let y = y0; y < y1; y += bh) bricks.push({x, y, w:bw, h:bh, ci:ci++});
  }

  switch (layout) {
    case 'full':
      row(0, 0, CW); row(CH-BH, 0, CW);
      col(0, BH, CH-BH); col(CW-BH, BH, CH-BH);
      break;

    case 'top-bottom':
      row(0, 0, CW); row(CH-BH, 0, CW);
      break;

    case 'sides':
      col(0, 0, CH); col(CW-BH, 0, CH);
      break;

    case 'top-only':
      row(0, 0, CW);
      break;

    case 'bottom-only':
      row(CH-BH, 0, CW);
      break;

    case 'corners':
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
        bricks.push({x:c*BH,         y:r*BH,         w:BH, h:BH, ci:ci++});
        bricks.push({x:CW-(4-c)*BH,  y:r*BH,         w:BH, h:BH, ci:ci++});
        bricks.push({x:c*BH,         y:CH-(4-r)*BH,  w:BH, h:BH, ci:ci++});
        bricks.push({x:CW-(4-c)*BH,  y:CH-(4-r)*BH,  w:BH, h:BH, ci:ci++});
      }
      break;

    case 'thick-top':
      row(0, 0, CW); row(BH, 0, CW); row(BH*2, 0, CW);
      break;

    case 'double-border':
      row(0, 0, CW);       row(CH-BH, 0, CW);
      col(0, BH, CH-BH);   col(CW-BH, BH, CH-BH);
      row(BH*2, BH*2, CW-BH*2);      row(CH-BH*3, BH*2, CW-BH*2);
      col(BH*2, BH*3, CH-BH*3);      col(CW-BH*3, BH*3, CH-BH*3);
      break;

    case 'checkerboard':
      for (let x = 0; x < CW; x += BW*2) {
        bricks.push({x, y:0,      w:BW, h:BH, ci:ci++});
        bricks.push({x:x+BW, y:BH, w:BW, h:BH, ci:ci++});
      }
      for (let x = 0; x < CW; x += BW*2) {
        bricks.push({x, y:CH-BH,    w:BW, h:BH, ci:ci++});
        bricks.push({x:x+BW, y:CH-BH*2, w:BW, h:BH, ci:ci++});
      }
      for (let y = 0; y < CH; y += BH*2) {
        bricks.push({x:0,  y,      w:BH, h:BH, ci:ci++});
        bricks.push({x:BH, y:y+BH, w:BH, h:BH, ci:ci++});
      }
      for (let y = 0; y < CH; y += BH*2) {
        bricks.push({x:CW-BH,   y,      w:BH, h:BH, ci:ci++});
        bricks.push({x:CW-BH*2, y:y+BH, w:BH, h:BH, ci:ci++});
      }
      break;

    case 'rainbow':
      for (let i = 0; i < 5; i++)
        for (let x = 0; x < CW; x += BW) bricks.push({x, y:i*BH, w:BW, h:BH, ci:i});
      break;

    case 'zigzag': {
      const period = BW * 4;
      for (let x = 0; x < CW; x += BW) {
        const phase = Math.floor(x / period * 4) % 4;
        const yOff  = phase < 2 ? phase : 4 - phase;
        bricks.push({x, y:yOff*BH,          w:BW, h:BH, ci:ci++});
        bricks.push({x, y:CH-BH-yOff*BH,    w:BW, h:BH, ci:ci++});
      }
      for (let y = 0; y < CH; y += BH) {
        const phase = Math.floor(y / BH) % 4;
        const xOff  = phase < 2 ? phase : 4 - phase;
        bricks.push({x:xOff*BH,       y, w:BH, h:BH, ci:ci++});
        bricks.push({x:CW-BH-xOff*BH, y, w:BH, h:BH, ci:ci++});
      }
      break;
    }

    case 'staircase':
      for (let i = 0; i < 6; i++) for (let j = 0; j <= i; j++) {
        bricks.push({x:j*BH,         y:i*BH,         w:BH, h:BH, ci:ci++});
        bricks.push({x:CW-(j+1)*BH,  y:i*BH,         w:BH, h:BH, ci:ci++});
        bricks.push({x:j*BH,         y:CH-(i+1)*BH,  w:BH, h:BH, ci:ci++});
        bricks.push({x:CW-(j+1)*BH,  y:CH-(i+1)*BH,  w:BH, h:BH, ci:ci++});
      }
      break;

    case 'diagonal-tl':
      for (let i = 0; i < Math.ceil((CW+CH)/BH); i++) {
        const len = Math.min(i+1, 8);
        for (let j = 0; j < len; j++) {
          const bx = i*BH - j*BH - BH, by = j*BH;
          if (bx >= 0 && bx < CW && by >= 0 && by < CH)
            bricks.push({x:bx, y:by, w:BH, h:BH, ci:ci++});
        }
      }
      break;

    case 'diagonal-tr':
      for (let i = 0; i < Math.ceil((CW+CH)/BH); i++) {
        const len = Math.min(i+1, 8);
        for (let j = 0; j < len; j++) {
          const bx = CW - i*BH + j*BH, by = j*BH;
          if (bx >= 0 && bx < CW && by >= 0 && by < CH)
            bricks.push({x:bx, y:by, w:BH, h:BH, ci:ci++});
        }
      }
      break;

    case 'arch': {
      const cx = CW/2, rx = CW*0.46, ry = CH*0.42;
      for (let x = 0; x < CW; x += BH) {
        const nx = (x + BH/2 - cx) / rx;
        if (Math.abs(nx) <= 1) {
          const y = CH/2 - ry*Math.sqrt(1 - nx*nx);
          if (y >= 0) bricks.push({x, y:Math.round(y/BH)*BH, w:BH, h:BH, ci:ci++});
        }
      }
      row(CH-BH, 0, CW, BH, BH);
      break;
    }

    case 'diamond': {
      const mx = CW/2, my = CH/2, rx = CW*0.47, ry = CH*0.47;
      for (let t = 0; t <= 360; t += 4) {
        const rad = t * Math.PI / 180;
        const bx = Math.round((mx + rx*Math.cos(rad)) / BH) * BH;
        const by = Math.round((my + ry*Math.sin(rad)) / BH) * BH;
        if (bx >= 0 && bx < CW && by >= 0 && by < CH &&
            !bricks.some(b => b.x === bx && b.y === by))
          bricks.push({x:bx, y:by, w:BH, h:BH, ci:ci++});
      }
      break;
    }

    case 'scattered':
      [[0,0],[BH,0],[BH*3,0],[BH*6,0],[BH*9,0],[BH*12,0],[BH*14,0],
       [CW-BH,0],[CW-BH*3,0],[CW-BH*5,0],
       [0,BH],[0,BH*3],[0,BH*6],[0,BH*9],[0,BH*12],[0,BH*15],
       [CW-BH,BH],[CW-BH,BH*4],[CW-BH,BH*8],[CW-BH,BH*12],[CW-BH,BH*16],
       [BH,CH-BH],[BH*4,CH-BH],[BH*8,CH-BH],[BH*12,CH-BH],[BH*15,CH-BH],
       [CW-BH*2,CH-BH],[CW-BH*5,CH-BH],[CW-BH*8,CH-BH],
       [BH*2,BH*2],[BH*5,BH*1],[CW-BH*3,BH*3],[BH,CH-BH*3],[CW-BH*2,CH-BH*4]
      ].forEach(([x,y]) => bricks.push({x, y, w:BH, h:BH, ci:ci++}));
      break;

    case 'wave':
      for (let x = 0; x < CW; x += BH) {
        const t    = x / CW * Math.PI * 4;
        const yTop = Math.round((BH + Math.sin(t) * BH * 1.5) / BH) * BH;
        const yBot = Math.round((CH - BH*3 + Math.sin(t + Math.PI) * BH * 1.5) / BH) * BH;
        bricks.push({x, y:Math.max(0, yTop),     w:BH, h:BH, ci:ci++});
        bricks.push({x, y:Math.min(CH-BH, yBot),  w:BH, h:BH, ci:ci++});
      }
      break;

    case 'left-accent':
      col(0, 0, CH); col(BH, 0, CH); col(BH*2, 0, CH);
      row(0, BH*3, CW); row(CH-BH, BH*3, CW);
      break;

    case 'cross':
      row(Math.floor(CH/2/BH)*BH,   0, CW, BH, BH);
      row(Math.floor(CH/2/BH)*BH-BH, 0, CW, BH, BH);
      col(Math.floor(CW/2/BH)*BH,   0, CH, BH, BH);
      col(Math.floor(CW/2/BH)*BH-BH, 0, CH, BH, BH);
      break;
  }
  return bricks;
}

  'bottom-only':  'Foundation Builder',
  'corners':      'Master Builder',
  'thick-top':    'Grand Achievement',
  'double-border':'Elite Builder Award',
  'checkerboard': 'Brick Champion',
  'rainbow':      'Rainbow Builder',
  'zigzag':       'Zigzag Creator',
  'staircase':    'Staircase Achiever',
  'diagonal-tl':  'Trail Blazer Award',
  'diagonal-tr':  'Pathfinder Award',
  'arch':         'Arch Builder Award',
  'diamond':      'Diamond Builder',
  'scattered':    'Star Builder Award',
  'wave':         'Wave Maker Award',
  'left-accent':  'Champion Builder',
  'cross':        'Legend Builder',
};

// ══════════════════════════════════════════════════════════════
// DRAW ALL BRICKS
// ══════════════════════════════════════════════════════════════
function redrawBricks() {
  const canvas = document.getElementById('brick-canvas');
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);
  const th     = THEMES[currentTheme];
  const bricks = layoutBricks(currentLayout);
  const seen   = new Set();
  bricks.forEach(({x, y, w, h, ci}) => {
    const key = `${x},${y}`;
    if (seen.has(key)) return;
    seen.add(key);
    if (x < 0 || y < 0 || x+w > CW+10 || y+h > CH+10) return;
    drawBrick(ctx, x, y, w, h,
      th.cols [Math.abs(ci) % th.cols.length],
      th.darks[Math.abs(ci) % th.darks.length]);
  });
}

// ══════════════════════════════════════════════════════════════
// APPLY INSET + BADGE POSITION
// ══════════════════════════════════════════════════════════════
function applyInset() {
  const ins = INSET[currentLayout] || INSET['full'];
  const cc  = document.getElementById('cert-content');
  cc.style.top    = ins.t + 'px';
  cc.style.right  = ins.r + 'px';
  cc.style.bottom = ins.b + 'px';
  cc.style.left   = ins.l + 'px';
  // Keep placement badge just inside the content boundary
  const badge = document.getElementById('placement-badge');
  badge.style.top   = (ins.t + 5) + 'px';
  badge.style.right = (ins.r + 5) + 'px';
}

// ══════════════════════════════════════════════════════════════
// THEME SWITCH
// ══════════════════════════════════════════════════════════════
function setTheme(name) {
  currentTheme = name;
  const page = document.getElementById('the-page');
  Object.keys(THEMES).forEach(t => page.classList.remove('t-' + t));
  page.classList.add('t-' + name);
  document.querySelectorAll('.theme-pill').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-theme="${name}"]`).classList.add('active');
  document.getElementById('stars-line').textContent = THEMES[name].stars;
  redrawBricks();
  updateMiniBricks();
  buildNameBricks(document.getElementById('name-input').value);
  if (sigCtx) sigCtx.strokeStyle = THEMES[name].sigCol;
}

// ══════════════════════════════════════════════════════════════
// LAYOUT SWITCH
// ══════════════════════════════════════════════════════════════
function setLayout(name) {
  currentLayout = name;
  document.querySelectorAll('.layout-pill').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-layout="${name}"]`).classList.add('active');
  redrawBricks();
  applyInset();
  document.getElementById('cert-title').textContent = LAYOUT_TITLES[name] || 'Speed Build Challenge';
}

// ══════════════════════════════════════════════════════════════
// MINI BRICKS
// ══════════════════════════════════════════════════════════════
function updateMiniBricks() {
  const th = THEMES[currentTheme];
  for (let i = 0; i < 8; i++) {
    const el = document.getElementById('mb' + i);
    if (el) el.style.background = th.cols[i % th.cols.length];
  }
}

// ══════════════════════════════════════════════════════════════
// NAME BRICKS — auto scale by character count
// ══════════════════════════════════════════════════════════════
function sizeClass(n) {
  if (n <= 6)  return 'brick-xl';
  if (n <= 9)  return 'brick-lg';
  if (n <= 13) return 'brick-md';
  if (n <= 17) return 'brick-sm';
  return 'brick-xs';
}

function buildNameBricks(name) {
  const container = document.getElementById('name-bricks');
  container.innerHTML = '';
  const th      = THEMES[currentTheme];
  const letters = (name || 'YOUR NAME').toUpperCase().split('');
  const nonSp   = letters.filter(l => l !== ' ').length;
  const sz      = sizeClass(nonSp);
  const spW     = {'brick-xl':10,'brick-lg':9,'brick-md':7,'brick-sm':6,'brick-xs':4};
  let ci = 0;
  letters.forEach(ltr => {
    if (ltr === ' ') {
      const sp = document.createElement('div');
      sp.style.width = (spW[sz] || 8) + 'px';
      container.appendChild(sp);
      return;
    }
    const col = th.cols [ci % th.cols.length];
    const drk = th.darks[ci % th.darks.length];
    ci++;
    const brick = document.createElement('div');
    brick.className = 'lego-letter ' + sz;
    brick.style.cssText = `background:${col};border-color:${drk};box-shadow:0 3px 0 ${drk};`;
    brick.innerHTML = `<div class="stud" style="background:${col};border-color:${drk}"></div>${ltr}`;
    container.appendChild(brick);
  });
}

// ══════════════════════════════════════════════════════════════
// PLACEMENT BADGE — show/hide + color by rank
// ══════════════════════════════════════════════════════════════
function updatePlacement(val) {
  const badge  = document.getElementById('placement-badge');
  const numEl  = document.getElementById('placement-num');
  const v      = val.trim();
  if (!v) { badge.style.display = 'none'; return; }
  numEl.textContent = v.toUpperCase();
  badge.className   = 'placement-badge';
  const lv = v.toLowerCase();
  if      (lv === '1st' || lv === '1') badge.classList.add('gold');
  else if (lv === '2nd' || lv === '2') badge.classList.add('silver');
  else if (lv === '3rd' || lv === '3') badge.classList.add('bronze');
  else                                  badge.classList.add('other');
  badge.style.display = 'flex';
}

// ══════════════════════════════════════════════════════════════
// STATS ROW — show each chip independently
// ══════════════════════════════════════════════════════════════
function updateStats() {
  const timeVal = document.getElementById('time-input').value.trim();
  const setVal  = document.getElementById('set-input').value.trim();
  const timeChip = document.getElementById('time-chip');
  const setChip  = document.getElementById('set-chip');
  document.getElementById('time-display').textContent = timeVal;
  document.getElementById('set-display').textContent  = setVal;
  timeChip.style.display = timeVal ? 'flex' : 'none';
  setChip.style.display  = setVal  ? 'flex' : 'none';
}

// ══════════════════════════════════════════════════════════════
// AGE BADGE — show/hide
// ══════════════════════════════════════════════════════════════
function updateAge(val) {
  const badge = document.getElementById('age-badge');
  const disp  = document.getElementById('age-display');
  const v = val.trim();
  badge.style.display = v ? 'inline-flex' : 'none';
  disp.textContent    = v ? 'Ages ' + v : '';
}

// ══════════════════════════════════════════════════════════════
// DATE — show/hide
// ══════════════════════════════════════════════════════════════
function updateDate(val) {
  const block = document.getElementById('date-block');
  const disp  = document.getElementById('date-display');
  const v = val.trim();
  block.style.display = v ? 'flex' : 'none';
  disp.textContent    = v;
}

// ══════════════════════════════════════════════════════════════
// ORG NAME
// ══════════════════════════════════════════════════════════════
function updateOrg(val) {
  document.getElementById('org-display').textContent = val.trim() || 'Your Organization';
}

function updateTitle(val) {
  const v = val.trim();
  document.getElementById('cert-title').textContent =
    v || LAYOUT_TITLES[currentLayout] || 'Speed Build Challenge';
}

// ══════════════════════════════════════════════════════════════
// SIGNATURE
// ══════════════════════════════════════════════════════════════
let sigCtx;
function initSig() {
  const canvas = document.getElementById('sig1');
  const ctx    = canvas.getContext('2d');
  ctx.strokeStyle = THEMES[currentTheme].sigCol;
  ctx.lineWidth = 1.8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let down = false;
  const pos = e => {
    const r = canvas.getBoundingClientRect();
    return e.touches
      ? {x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top}
      : {x: e.clientX - r.left,            y: e.clientY - r.top};
  };
  canvas.addEventListener('mousedown',  e => { down=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); });
  canvas.addEventListener('mousemove',  e => { if(!down) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup',    () => down = false);
  canvas.addEventListener('mouseleave', () => down = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); down=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchmove',  e => { if(!down) return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }, {passive:false});
  canvas.addEventListener('touchend',   () => down = false);
  return ctx;
}
function clearSig() {
  const c = document.getElementById('sig1');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

// ══════════════════════════════════════════════════════════════
// EVENT WIRING
// ══════════════════════════════════════════════════════════════
document.querySelectorAll('.theme-pill') .forEach(b => b.addEventListener('click', () => setTheme(b.dataset.theme)));
document.querySelectorAll('.layout-pill').forEach(b => b.addEventListener('click', () => setLayout(b.dataset.layout)));
document.getElementById('name-input')     .addEventListener('input', function() { buildNameBricks(this.value); });
document.getElementById('placement-input').addEventListener('input', function() { updatePlacement(this.value); });
document.getElementById('time-input')     .addEventListener('input', updateStats);
document.getElementById('set-input')      .addEventListener('input', updateStats);
document.getElementById('age-input')      .addEventListener('input', function() { updateAge(this.value); });
document.getElementById('date-input')     .addEventListener('input', function() { updateDate(this.value); });
document.getElementById('org-input')      .addEventListener('input', function() { updateOrg(this.value); });
document.getElementById('title-input')     .addEventListener('input', function() { updateTitle(this.value); });

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  redrawBricks();
  applyInset();
  updateMiniBricks();
  buildNameBricks('YOUR NAME');
  sigCtx = initSig();
});
</script>
